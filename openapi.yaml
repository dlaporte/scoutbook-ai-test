  /advancements/advancementHistory:
    post:
      tags:
      - Bulk Advancement
      summary: Bulk advancement history for an organization
      description: 'Returns all advancement records (ranks, merit badges, awards, or
        adventures) for every youth in an organization in a single call. Each user
        object contains a `recordedInformation` array with full advancement details.
        Use the `perPage` query parameter for pagination (default 500). This endpoint
        replaces the need to make per-scout calls to `/advancements/v2/youth/{userId}/ranks`,
        `/advancements/v2/youth/{userId}/meritBadges`, and `/advancements/v2/youth/{userId}/awards`.'
      parameters:
      - name: perPage
        in: query
        schema:
          type: integer
          default: 500
        description: Number of records per page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - advancementType
              - organizationGuid
              properties:
                advancementType:
                  type: string
                  enum:
                  - ranks
                  - meritBadges
                  - awards
                  - adventures
                  description: The type of advancement to fetch
                status:
                  type: array
                  items:
                    type: string
                    enum:
                    - Started
                    - Completed
                    - Awarded
                    - LeaderApproved
                    - CounselorApproved
                  description: Filter by status (PascalCase). Defaults to all statuses.
                showAdults:
                  type: boolean
                  default: false
                  description: Include adult members
                showYouths:
                  type: boolean
                  default: true
                  description: Include youth members
                organizationGuid:
                  type: string
                  description: The organization GUID to fetch history for
      responses:
        '200':
          description: Array of user objects with advancement records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId:
                      type: integer
                    personGuid:
                      type: string
                    memberId:
                      type: integer
                    firstName:
                      type: string
                    lastName:
                      type: string
                    nickName:
                      type: string
                    recordedInformation:
                      type: array
                      items:
                        type: object
                        properties:
                          advancementType:
                            type: string
                            description: '"Rank", "MeritBadge", or "Award"'
                          id:
                            type: integer
                          name:
                            type: string
                          version:
                            type: string
                          versionId:
                            type: integer
                          programId:
                            type: integer
                          program:
                            type: string
                          dateEarned:
                            type: string
                            format: date
                            nullable: true
                          dateStarted:
                            type: string
                            format: date
                            nullable: true
                          dateCompleted:
                            type: string
                            format: date
                            nullable: true
                          percentCompleted:
                            type: number
                          eagleRequired:
                            type: boolean
                            description: Merit badges only
                          status:
                            type: string
                            description: '"Started", "Completed", "Awarded", etc.'
                          statusId:
                            type: integer
                          leaderApprovedDate:
                            type: string
                            format: date
                            nullable: true
                          leaderApprovedUserId:
                            type: integer
                            nullable: true
                          awarded:
                            type: boolean
                          awardedDate:
                            type: string
                            format: date
                            nullable: true
                          markedCompletedDate:
                            type: string
                            format: date
                            nullable: true
                          requirements:
                            type: array
                            items:
                              type: object
  /organizations/{organizationGuid}/advancementsReadyToBeAwarded:
    post:
      tags:
      - Bulk Advancement
      summary: Get advancements ready to be awarded
      description: 'Returns all advancements (ranks, merit badges, awards, adventures) that have been completed and leader-approved
        but not yet awarded/purchased. Results are grouped by advancement type.


        **Replaces the deprecated `GET /organizations/v2/{organizationGuid}/advancementsReadyToAward` endpoint (now returns 404).**


        The response is a top-level JSON array of category objects. Each category contains an `advancementType` and an `advancements`
        array listing each advancement with the members who earned it.


        **Important:** For the `meritBadge` type, the `advancements` field is a nested array (array of arrays) that must be flattened
        before processing.


        The request body should be an empty JSON array `[]`.

        '
      parameters:
      - name: organizationGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: advancementType
        in: query
        required: true
        description: 'Filter by advancement type. Use "all" to get all types.'
        schema:
          type: string
          enum:
          - all
          - rank
          - meritBadge
          - award
          - adventure
      - name: orderBy
        in: query
        required: false
        description: Sort order for results
        schema:
          type: string
          enum:
          - advancement
          - member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: {}
              description: Empty JSON array
              example: []
      responses:
        '200':
          description: Advancements ready to be awarded grouped by type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostOrganizationsAdvancementsReadyToBeAwardedResponse'
