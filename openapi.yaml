openapi: 3.0.3
info:
  title: Scoutbook/Scouting.org API
  description: 'Unofficial API documentation for the BSA Scoutbook/Scouting.org API.


    ## API Structure

    - **Authentication**: JWT bearer tokens via auth.scouting.org

    - **Discovery & Profile**: Person profiles, roles, toolkits, subscriptions, and relationships

    - **Unit Roster**: Youth, adult, parent rosters, subunits, key3, and org profile

    - **Training & Compliance**: YPT status, training records, and position training requirements

    - **Membership & Renewal**: Memberships, positions, registrations, renewals, recharter, and OLR

    - **Advancement Catalog**: Rank, merit badge, award, and adventure definitions and requirements

    - **Youth Progress**: Per-youth ranks, merit badges, awards, adventures, and leadership history

    - **Bulk Advancement**: Organization-wide advancement history and ready-to-award reports

    - **Events & Calendar**: Calendar entries, events, guests, and communications

    - **Activities**: Camping, hiking, service hour logs

    - **Organization Dashboards**: Advancement, renewal, activities, and roundtable dashboards

    - **Commissioners**: Commissioner assignments, roundtable, and unit health

    - **Lookups**: Reference data (states, positions, training courses, etc.)


    ## Common Patterns

    - Most endpoints require Bearer token authentication

    - GUIDs are used for person and organization identifiers

    - User IDs (numeric) are used for youth advancement endpoints


    ## API Versioning (v1 vs v2)

    Many endpoints exist in both v1 (no version in path) and v2 (with `/v2/` in path) versions:

    - **v2 endpoints are generally preferred** when available - they offer enhanced data and better structure

    - **v1 endpoints remain useful** for reference data (all ranks, all badges) or where v2 doesn''t exist

    - **Some v1 endpoints split into multiple v2 endpoints** (e.g., `/persons/{id}/trainings` → `/ypt` + `/positionTrainingRequirements`)

    - Each v1 endpoint description notes its v2 equivalent(s) where applicable

    '
