paths:
  /api/users/{username}/authenticate:
    post:
      tags:
      - Authentication
      summary: Authenticate user and obtain JWT token
      description: 'Authenticates a user and returns a JWT bearer token for API access.

        The token includes personGuid, organizationGuid, and userId claims.

        '
      servers:
      - url: https://auth.scouting.org
      parameters:
      - name: username
        in: path
        required: true
        description: BSA member username (usually email)
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - password
              properties:
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Successful authentication - returns JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
  /persons/{personGuid}/profile:
    get:
      tags:
      - Discovery & Profile
      summary: Get profile
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsProfileResponse'
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      description: 'Returns basic profile information for a person. For more detailed data including Eagle status and images,
        use /personprofile instead.


        **For more comprehensive profile data including Eagle Scout status, OA membership, and profile images, use the v2
        endpoint: `/persons/v2/{personGuid}/personprofile`.**'
  /persons/{personGuid}/roleTypes:
    get:
      tags:
      - Discovery & Profile
      summary: Get role types
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsRoletypesResponse'
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: includeParentRoles
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Include parent/guardian roles in the response.
      - name: includeScoutbookRoles
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Include Scoutbook-specific roles in the response.
      description: 'Returns the types of roles a person holds (adult leader, youth, parent, etc.).


        **Note: There is no v2 equivalent for this endpoint.**'
  /persons/{personGuid}/subscriptions:
    get:
      tags:
      - Discovery & Profile
      summary: Get subscriptions
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsSubscriptionsResponse'
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      description: 'Returns the person''s notification and communication preferences.


        **Note: There is no v2 equivalent for this endpoint.**'
  /persons/{personGuid}/renewalRelationships:
    get:
      tags:
      - Discovery & Profile
      summary: Get renewal relationships
      description: 'Returns family/household relationships for renewal purposes.


        **Note:** v2 endpoint does not exist - this is the v1 endpoint.

        '
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of renewal relationships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsRenewalrelationshipsResponse'
  /persons/{userId}/myScout:
    get:
      tags:
      - Discovery & Profile
      summary: Get my scout
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsMyscoutResponse'
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      description: 'Returns the My.Scouting.org profile data for a user.


        **Note:** This is a v1 endpoint. For comprehensive profile data (Eagle status, OA membership, profile images),
        use the v2 endpoint: `GET /persons/v2/{personGuid}/personprofile`.'
  /persons/v2/{personGuid}/personprofile:
    get:
      tags:
      - Discovery & Profile
      summary: Get detailed person profile
      description: 'Returns comprehensive profile data including:

        - Eagle Scout status and date

        - Order of the Arrow membership

        - Swimming classification

        - Health/medical record dates

        - Profile images


        **Use this for detailed member information.**

        '
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Detailed person profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2PersonprofileResponse'
  /persons/v2/{userId}/personprofile:
    get:
      tags:
      - Discovery & Profile
      summary: Get personprofile
      responses:
        '200':
          description: Returns comprehensive profile data using numeric userId. Same data as the personGuid variant; use whichever identifier you have available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2PersonprofileResponse'
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
        description: Numeric BSA user ID
      description: Returns comprehensive profile data using numeric user ID instead of GUID.
  /persons/v2/{personGuid}/parentGuardianInvitation:
    get:
      tags:
      - Discovery & Profile
      summary: Get parent guardian invitation
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2ParentguardianinvitationResponse'
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      description: Returns pending parent/guardian connection invitations for a youth member.
  /persons/v2/{personGuid}/relationships:
    get:
      tags:
      - Discovery & Profile
      summary: Get relationships
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2RelationshipsResponse'
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      description: Returns family relationships (parents, guardians, siblings) for a person.
  /persons/v2/{personGuid}/toolkits:
    get:
      tags:
      - Discovery & Profile
      summary: Get organizations person can access
      description: 'Returns list of organizations (units, councils) the person has access to.

        Useful for discovering available organizationGuids.

        '
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List of accessible organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2ToolkitsResponse'
  /persons/v2/{personGuid}/{organizationGuid}/tools:
    get:
      tags:
      - Discovery & Profile
      summary: Get available tools for person in specific organization
      description: Returns tools/features and permissions for the person within a specific unit
      parameters:
      - name: personGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: organizationGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Tools and permissions for the organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsV2ToolsResponse'
  /organizations/v2/{organizationGuid}/profile:
    get:
      tags:
      - Unit Roster
      summary: Get organization profile
      description: Returns unit profile including charter org, meeting location, etc.
      parameters:
      - name: organizationGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Organization profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationsV2ProfileResponse'
  /organizations/v2/{organizationGuid}/key3:
    get:
      tags:
      - Unit Roster
      summary: Get Key 3 leaders
      description: 'Returns the unit''s Key 3 leadership:

        - Committee Chair

        - Scoutmaster/Cubmaster/Skipper/Advisor

        - Charter Organization Representative

        '
      parameters:
      - name: organizationGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Key 3 leader information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationsV2Key3Response'
  /organizations/v2/{organizationGuid}/orgAdults:
    post:
      tags:
      - Unit Roster
      summary: Get adult members with full details
      description: 'Returns adult members with optional registration and training details.


        **Set includeRegistrationDetails: true to get registrarInfo with expiration dates.**

        '
      parameters:
      - name: organizationGuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
